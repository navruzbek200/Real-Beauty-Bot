# Real Beauty CRM — nginx in front of gunicorn.
#
# TLS: point certbot at this server block (`certbot --nginx`) after the DNS
# A-record is live; it rewrites the config for 443 itself.

gzip on;
gzip_vary on;
gzip_min_length 256;
gzip_comp_level 5;
gzip_types text/css text/plain text/xml application/javascript application/json application/xml image/svg+xml;

server {
    listen 80;
    server_name _;

    client_max_body_size 100M;  # tutorial videos are uploaded through the admin

    # Progress-photo thumbnails, product images, tutorial videos.
    location /media/ {
        alias /srv/media/;
        expires 7d;
        add_header Cache-Control "public";
    }

    # Whitenoise also serves static from gunicorn; nginx doing it directly is
    # just cheaper. Same files, same hashes.
    location /static/ {
        alias /srv/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location / {
        proxy_pass http://django:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
